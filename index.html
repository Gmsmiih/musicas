<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Player 🎧</title>
</head>

<body>

<h1>🎧 Meu Player</h1>

<ul class="musicas">

<li onclick="tocarMusica('musicas/A-Drop-In-The-Ocean.mp3', 'A Drop In The Ocean')">A Drop In The Ocean</li>

<li onclick="tocarMusica('musicas/American-girls.mp3', 'American Girls')">American Girls</li>

<li onclick="tocarMusica('musicas/Aperture.mp3', 'Aperture')">Aperture</li>

<li onclick="tocarMusica('musicas/Brain-&-Heart.mp3', 'Brain & Heart')">Brain & Heart</li>

<li onclick="tocarMusica('musicas/Espresso.mp3', 'Espresso')">Espresso</li>

<li onclick="tocarMusica('musicas/FRIENDS.mp3', 'FRIENDS')">FRIENDS</li>

<li onclick="tocarMusica('musicas/Feel-So-Close.mp3', 'Feel So Close')">Feel So Close</li>

<li onclick="tocarMusica('musicas/Hold-On.mp3', 'Hold On')">Hold On</li>

<li onclick="tocarMusica('musicas/Manchild.mp3', 'Manchild')">Manchild</li>

<li onclick="tocarMusica('musicas/Seven.mp3', 'Seven')">Seven</li>

<li onclick="tocarMusica('musicas/Style.mp3', 'Style')">Style</li>

<li onclick="tocarMusica('musicas/Late-Night-Talking.mp3', 'Late Night Talking')">Late Night Talking</li>

<li onclick="tocarMusica('musicas/Internet-Girl.mp3', 'Internet Girl')">Internet Girl</li>

<li onclick="tocarMusica('musicas/Opalite.mp3', 'Opalite')">Opalite</li>

<li onclick="tocarMusica('musicas/When-Did-You-Get-Hot.mp3', 'When Did You Get Hot')">When Did You Get Hot</li>

<li onclick="tocarMusica('musicas/Iris.mp3', 'Iris')">Iris</li>

</ul>

<p id="tocando">Nenhuma música tocando</p>



<audio id="player"></audio>

<script>
const player = document.getElementById("player");
const texto = document.getElementById("tocando");

function tocarMusica(src, nome) {
  player.src = src;
  player.play();
  texto.innerText = "🎧 Tocando: " + nome;
}
</script>

</body>
</html>
